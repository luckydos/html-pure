<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HTML Pure</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--primary-color: #3b82f6;
			--primary-hover: #2563eb;
			--bg-color: #f8fafc;
			--card-bg: #ffffff;
			--text-main: #0f172a;
			--text-muted: #64748b;
			--border-color: #e2e8f0;
			--radius: 12px;
			--shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: 'Noto Sans KR', sans-serif;
		}

		body {
			background-color: var(--bg-color);
			color: var(--text-main);
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 24px 16px;
		}

		.container {
			width: 100%;
			max-width: 1200px;
			background: var(--card-bg);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 32px 28px;
			border: 1px solid var(--border-color);
		}

		.header {
			margin-bottom: 20px;
			text-align: center;
		}

		.header h1 {
			font-size: 1.75rem;
			font-weight: 700;
			color: var(--text-main);
		}

		/* 상단 설명 가이드 카드 */
		.guide-card {
			background-color: #f1f5f9;
			border: 1px solid var(--border-color);
			border-left: 4px solid var(--primary-color);
			border-radius: 8px;
			padding: 16px 20px;
			margin-bottom: 20px;
			font-size: 0.88rem;
			color: #334155;
			line-height: 1.6;
		}

		.guide-card h3 {
			font-size: 0.95rem;
			color: var(--text-main);
			margin-bottom: 6px;
		}

		.guide-card ul {
			margin-left: 18px;
			margin-top: 4px;
		}

		/* 기본 삭제 옵션 체크박스 영역 */
		.default-options-box {
			background-color: #fafafa;
			border: 1px solid var(--border-color);
			border-radius: 8px;
			padding: 16px;
			margin-bottom: 20px;
		}

		.options-title {
			font-size: 0.9rem;
			font-weight: 700;
			color: var(--text-main);
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		/* 전체 선택 버튼 토글 강조 스타일 */
		.toggle-all-label {
			font-size: 0.82rem;
			font-weight: 600;
			color: var(--primary-color);
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 6px;
			background-color: #eff6ff;
			padding: 4px 10px;
			border-radius: 6px;
			border: 1px solid #bfdbfe;
		}

		.options-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
			gap: 10px 16px;
		}

		.checkbox-label {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 0.85rem;
			color: #334155;
			cursor: pointer;
			user-select: none;
		}

		.checkbox-label input[type="checkbox"],
		.toggle-all-label input[type="checkbox"] {
			width: 16px;
			height: 16px;
			accent-color: var(--primary-color);
			cursor: pointer;
		}

		.checkbox-label code {
			background-color: #e2e8f0;
			padding: 2px 6px;
			border-radius: 4px;
			font-family: 'Fira Code', monospace;
			font-size: 0.8rem;
			color: #0f172a;
		}

		/* 사용자 정의 삭제 입력 필드 */
		.custom-delete-box {
			margin-bottom: 20px;
		}

		.custom-delete-box label {
			display: block;
			font-size: 0.85rem;
			font-weight: 600;
			margin-bottom: 6px;
			color: var(--text-main);
		}

		.custom-delete-box input[type="text"] {
			width: 100%;
			padding: 10px 14px;
			font-size: 0.88rem;
			color: var(--text-main);
			background-color: #fafafa;
			border: 1px solid var(--border-color);
			border-radius: 8px;
			outline: none;
			transition: all 0.2s ease;
		}

		.custom-delete-box input[type="text"]:focus {
			background-color: #ffffff;
			border-color: var(--primary-color);
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
		}

		/* 에디터 레이아웃 */
		.editor-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			margin-bottom: 20px;
		}

		@media (max-width: 900px) {
			.editor-grid {
				grid-template-columns: 1fr;
			}
		}

		.editor-box {
			display: flex;
			flex-direction: column;
		}

		.editor-box label {
			font-size: 0.9rem;
			font-weight: 600;
			margin-bottom: 8px;
			color: var(--text-main);
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		textarea {
			width: 100%;
			height: 500px;
			padding: 16px;
			font-family: 'Fira Code', monospace;
			font-size: 0.88rem;
			line-height: 1.5;
			color: #1e293b;
			background-color: #f8fafc;
			border: 1px solid var(--border-color);
			border-radius: 8px;
			outline: none;
			resize: vertical;
			tab-size: 2;
		}

		textarea:focus {
			background-color: #ffffff;
			border-color: var(--primary-color);
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
		}

		.btn-group {
			display: flex;
			gap: 12px;
		}

		button {
			flex: 1;
			padding: 14px;
			font-size: 1rem;
			font-weight: 600;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.btn-primary {
			background-color: var(--primary-color);
			color: #ffffff;
		}

		.btn-primary:hover {
			background-color: var(--primary-hover);
		}

		.btn-secondary {
			background-color: #e2e8f0;
			color: #334155;
		}

		.btn-secondary:hover {
			background-color: #cbd5e1;
		}

		.copy-badge {
			font-size: 0.75rem;
			color: #16a34a;
			display: none;
		}
	</style>
</head>

<body>

	<div class="container">
		<div class="header">
			<h1>🧹 HTML Pure Cleaner</h1>
		</div>

		<!-- 상단 설명 가이드 카드 -->
		<div class="guide-card">
			<h3>📌 사용법 가이드</h3>
			<p>복사해 온 HTML 코드를 좌측 상자에 붙여넣고 아래 버튼을 누르면 설정한 규칙에 따라 정제 및 포맷팅이 진행됩니다.</p>
			<ul>
				<li><b>기본 삭제 선택:</b> 체크된 태그 및 속성은 자동으로 제거됩니다. (필요 시 체크 해제 가능)</li>
				<li><b>들여쓰기:</b> 스페이스 대신 <b>Tab(탭) 문자로 코드 포맷팅</b>합니다.</li>
			</ul>
		</div>

		<!-- 기본 삭제 옵션 체크박스 박스 -->
		<div class="default-options-box">
			<div class="options-title">
				<span>⚙️ 기본 삭제 대상 선택</span>
				<!-- 💡 전체 선택 / 해제 토글 체크박스 추가 -->
				<label class="toggle-all-label">
					<input type="checkbox" id="selectAll" checked onclick="toggleAllCheckboxes(this)">
					전체 선택 / 해제
				</label>
			</div>
			<div class="options-grid">
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delStyle" checked onclick="syncSelectAllState()">
					인라인 스타일 (<code>style="..."</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delP" checked onclick="syncSelectAllState()">
					태그 (<code>&lt;p&gt;</code>, <code>&lt;/p&gt;</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delSpan" checked onclick="syncSelectAllState()">
					태그 (<code>&lt;span&gt;</code>, <code>&lt;/span&gt;</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delStrong" checked onclick="syncSelectAllState()">
					태그 (<code>&lt;strong&gt;</code>, <code>&lt;/strong&gt;</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delClass0" checked onclick="syncSelectAllState()">
					속성 (<code>class="0"</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delValign" checked onclick="syncSelectAllState()">
					속성 (<code>valign="middle"</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delRowspan" checked onclick="syncSelectAllState()">
					속성 (<code>rowspan="1"</code>)
				</label>
				<label class="checkbox-label">
					<input type="checkbox" class="opt-check" id="delColspan" checked onclick="syncSelectAllState()">
					속성 (<code>colspan="1"</code>)
				</label>
			</div>
		</div>

		<!-- 사용자 지정 추가 삭제 입력창 -->
		<div class="custom-delete-box">
			<label for="customDelete">➕ 추가로 삭제할 문구/태그 (쉼표 <code>,</code> 로 구분)</label>
			<input type="text" id="customDelete" placeholder='예: <b>, </b>, class="active", id="main"'>
		</div>

		<div class="editor-grid">
			<div class="editor-box">
				<label for="inputHtml">원본 HTML 코드</label>
				<textarea id="inputHtml" placeholder="여기에 정리할 HTML 코드를 붙여넣으세요..."></textarea>
			</div>

			<div class="editor-box">
				<label for="outputHtml">
					정돈된 HTML 코드
					<span id="copyBadge" class="copy-badge">✓ 클립보드에 복사됨!</span>
				</label>
				<textarea id="outputHtml" readonly placeholder="포맷팅 버튼을 누르면 정제 및 Tab 정돈된 코드가 출력됩니다."></textarea>
			</div>
		</div>

		<div class="btn-group">
			<button class="btn-primary" onclick="processHtml()">✨ 태그 정제 및 Tab 포맷팅</button>
			<button class="btn-secondary" onclick="copyResult()">📋 결과 복사</button>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.11/beautify-html.min.js"></script>

	<script>
		// 💡 전체 선택 / 해제 동작 함수
		function toggleAllCheckboxes(master) {
			const checkboxes = document.querySelectorAll('.opt-check');
			checkboxes.forEach(cb => {
				cb.checked = master.checked;
			});
		}

		// 💡 개별 체크박스 조작 시 '전체 선택' 체크박스 상태 동기화
		function syncSelectAllState() {
			const checkboxes = document.querySelectorAll('.opt-check');
			const selectAll = document.getElementById('selectAll');
			const allChecked = Array.from(checkboxes).every(cb => cb.checked);
			selectAll.checked = allChecked;
		}

		function processHtml() {
			const rawHtml = document.getElementById('inputHtml').value;
			if (!rawHtml.trim()) {
				alert('포맷팅할 HTML 코드를 입력해 주세요.');
				return;
			}

			let cleanedHtml = rawHtml;

			// 1. 체크박스 선택 여부에 따른 동적 정규식 삭제 처리
			const deletePatterns = [];

			if (document.getElementById('delStyle').checked) deletePatterns.push(/style=".*?"/gi);
			if (document.getElementById('delP').checked) deletePatterns.push(/<p>|<\/p>/gi);
			if (document.getElementById('delSpan').checked) deletePatterns.push(/<span>|<\/span>/gi);
			if (document.getElementById('delStrong').checked) deletePatterns.push(/<strong>|<\/strong>/gi);
			if (document.getElementById('delClass0').checked) deletePatterns.push(/ class="0"/gi);
			if (document.getElementById('delValign').checked) deletePatterns.push(/ valign="middle"/gi);
			if (document.getElementById('delRowspan').checked) deletePatterns.push(/ rowspan="1"/gi);
			if (document.getElementById('delColspan').checked) deletePatterns.push(/ colspan="1"/gi);

			deletePatterns.forEach(pattern => {
				cleanedHtml = cleanedHtml.replace(pattern, '');
			});

			// 2. 사용자가 추가로 입력한 삭제 문구/태그 처리
			const customInput = document.getElementById('customDelete').value.trim();
			if (customInput) {
				const customItems = customInput.split(',').map(item => item.trim()).filter(item => item.length > 0);

				customItems.forEach(item => {
					const escapedItem = item.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
					const customRegExp = new RegExp(escapedItem, 'gi');
					cleanedHtml = cleanedHtml.replace(customRegExp, '');
				});
			}

			// 3. Tab 들여쓰기 옵션으로 js-beautify 포맷팅 설정
			const options = {
				indent_size: 1,
				indent_char: "\t",         // Tab 문자로 들여쓰기
				indent_with_tabs: true,    // Tab 들여쓰기 활성화
				max_preserve_newlines: 1,
				preserve_newlines: true,
				indent_scripts: "normal",
				end_with_newline: false,
				wrap_line_length: 0
			};

			const formattedHtml = html_beautify(cleanedHtml, options);
			document.getElementById('outputHtml').value = formattedHtml;
		}

		function copyResult() {
			const outputArea = document.getElementById('outputHtml');
			if (!outputArea.value) return;

			navigator.clipboard.writeText(outputArea.value).then(() => {
				const badge = document.getElementById('copyBadge');
				badge.style.display = 'inline';
				setTimeout(() => {
					badge.style.display = 'none';
				}, 2000);
			});
		}
	</script>
</body>

</html>
